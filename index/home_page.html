<!DOCTYPE html>
<html>
  <head>
  <title>Diary_app</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="home_page.css">
  </head>
  <body>
    <h1>Diary</h1>
    <div class="ToDoList">
      <h2>振り返り</h2>
      <!-- labelがあることで当たり判定が文字に及ぶ -->
      <p id = "iToDoList"></p>
    </div>
    <div class="DiaryTextBox">
      <h2>今日の日記</h2>
      <!-- colsが横の長さ、rowsが縦の長さ -->
      <textarea name="Diary" rows="10" cols="40"></textarea>
    </div>

    <script src="home_page.js"></script>
  </body>
  </html>
